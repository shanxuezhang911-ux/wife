<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0; min-height: 100vh;
  }

  .header {
    background: #111; border-bottom: 1px solid #222; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 { font-size: 18px; color: #e94560; white-space: nowrap; }
  .token-bar {
    display: flex; align-items: center; gap: 8px; flex: 1; max-width: 480px;
  }
  .token-bar input {
    flex: 1; padding: 6px 12px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; font-size: 13px; outline: none;
  }
  .token-bar input:focus { border-color: #e94560; }
  .token-bar button {
    padding: 6px 16px; border-radius: 6px; border: none;
    background: #e94560; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .token-bar button:hover { background: #d13550; }

  .toast {
    position: fixed; top: 20px; right: 20px; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; z-index: 999;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.ok { background: #1b5e20; color: #a5d6a7; }
  .toast.err { background: #b71c1c; color: #ef9a9a; }

  .main { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }

  .card {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 12px;
  }
  .card h2 { font-size: 15px; color: #aaa; font-weight: 500; }

  /* ---- Form rows ---- */
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .form-row input {
    padding: 8px 12px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; font-size: 13px; outline: none;
  }
  .form-row input:focus { border-color: #e94560; }
  .form-row input.name { flex: 1; min-width: 80px; }
  .form-row input.amount { width: 80px; }
  .form-row input.device-id { flex: 2; min-width: 120px; }
  .form-row input.max-day { width: 80px; }
  .btn-add {
    padding: 8px 16px; border-radius: 6px; border: none;
    background: #2a5a2a; color: #a5d6a7; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .btn-add:hover { background: #3a6a3a; }

  /* ---- Lists ---- */
  .item-list { display: flex; flex-direction: column; gap: 4px; max-height: 400px; overflow-y: auto; }
  .item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: #1a1a1a; border-radius: 6px; gap: 8px;
  }
  .item-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .item-name { font-size: 14px; color: #e0e0e0; }
  .item-meta { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-amount { font-size: 13px; color: #e94560; white-space: nowrap; margin-right: 8px; }
  .btn-del {
    padding: 2px 10px; border-radius: 4px; border: none;
    background: #3a1a1a; color: #ef9a9a; font-size: 12px; cursor: pointer; white-space: nowrap;
  }
  .btn-del:hover { background: #5a2a2a; }
  .empty { color: #555; font-size: 13px; font-style: italic; }

  /* ---- Stats ---- */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box { background: #1a1a1a; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-box .val { font-size: 28px; font-weight: 600; color: #e94560; }
  .stat-box .lbl { font-size: 11px; color: #666; margin-top: 4px; }

  /* ---- Rate Limit ---- */
  .limit-form { display: flex; flex-direction: column; gap: 10px; }
  .limit-row { display: flex; align-items: center; gap: 10px; }
  .limit-row label { font-size: 13px; color: #888; width: 130px; text-align: right; }
  .limit-row input {
    width: 80px; padding: 6px 10px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; font-size: 14px; text-align: center; outline: none;
  }
  .limit-row input:focus { border-color: #e94560; }
  .limit-save {
    align-self: flex-end; padding: 8px 24px; border-radius: 6px; border: none;
    background: #e94560; color: #fff; font-size: 13px; cursor: pointer; margin-top: 4px;
  }
  .limit-save:hover { background: #d13550; }

  .loading { color: #555; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>GM Admin</h1>
  <div class="token-bar">
    <input id="tokenInput" type="password" placeholder="GM Token">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="main">
  <!-- Left Column -->
  <div style="display:flex;flex-direction:column;gap:24px;">
    <!-- Sponsors -->
    <div class="card">
      <h2>Sponsors</h2>
      <div class="form-row">
        <input id="sName" class="name" placeholder="Name">
        <input id="sAmount" class="amount" type="number" placeholder="Amount" min="0" step="0.01">
        <input id="sDeviceId" class="device-id" placeholder="DeviceId (optional)">
        <button class="btn-add" onclick="addSponsor()">+ Add</button>
      </div>
      <div id="sponsorList" class="item-list">
        <div class="loading">Login first</div>
      </div>
    </div>

    <!-- Device Limits -->
    <div class="card">
      <h2>Device Limits</h2>
      <div class="form-row">
        <input id="dlDeviceId" class="device-id" placeholder="DeviceId">
        <input id="dlMaxPerDay" class="max-day" type="number" placeholder="Max/Day (-1=∞)" min="-1">
        <button class="btn-add" onclick="addDeviceLimit()">Set</button>
      </div>
      <div id="deviceLimitList" class="item-list"></div>
    </div>
  </div>

  <!-- Right Column -->
  <div style="display:flex;flex-direction:column;gap:24px;">
    <!-- Stats -->
    <div class="card">
      <h2>Stats (Today)</h2>
      <div id="statsArea" class="stat-grid">
        <div class="loading">--</div>
      </div>
    </div>

    <!-- Rate Limit -->
    <div class="card">
      <h2>Global Rate Limit</h2>
      <div class="limit-form">
        <div class="limit-row">
          <label>IP Max/Day</label>
          <input id="ipMax" type="number" min="1" value="20">
        </div>
        <div class="limit-row">
          <label>Device Max/Day</label>
          <input id="deviceMax" type="number" min="1" value="10">
        </div>
        <button class="limit-save" onclick="saveRateLimit()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = location.origin;
let token = localStorage.getItem('gm_token') || '';

(function() {
  document.getElementById('tokenInput').value = token;
  if (token) refresh();
})();

function login() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) return toast('Token required', false);
  localStorage.setItem('gm_token', token);
  refresh();
}

function refresh() {
  loadSponsors();
  loadStats();
  loadDeviceLimits();
}

function api(method, path, body) {
  const opts = {
    method,
    headers: { 'X-GM-Token': token, 'Content-Type': 'application/json' }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  return fetch(BASE + path, opts).then(r => r.json()).then(res => {
    if (res.code !== 0) throw new Error(res.message || 'Error');
    return res.data;
  });
}

// ---- Sponsors ----
function loadSponsors() {
  api('GET', '/gm/sponsors').then(list => {
    const el = document.getElementById('sponsorList');
    if (!list || list.length === 0) {
      el.innerHTML = '<div class="empty">No sponsors</div>';
      return;
    }
    el.innerHTML = list.map(function(s) {
      var meta = s.deviceId ? '<span class="item-meta">' + esc(s.deviceId) + '</span>' : '';
      var amt = s.amount > 0 ? '<span class="item-amount">' + s.amount + '</span>' : '';
      return '<div class="item">'
        + '<div class="item-info">'
        + '<span class="item-name">' + esc(s.name) + '</span>'
        + meta
        + '</div>'
        + amt
        + '<button class="btn-del" onclick="removeSponsor(\'' + esc(s.id) + '\')">x</button>'
        + '</div>';
    }).join('');
  }).catch(e => {
    document.getElementById('sponsorList').innerHTML = '<div class="empty">Failed to load</div>';
  });
}

function addSponsor() {
  const name = document.getElementById('sName').value.trim();
  const amount = parseFloat(document.getElementById('sAmount').value) || 0;
  const deviceId = document.getElementById('sDeviceId').value.trim() || null;
  if (!name) return toast('Name required', false);
  api('POST', '/gm/sponsors/add', { name, amount, deviceId }).then(() => {
    document.getElementById('sName').value = '';
    document.getElementById('sAmount').value = '';
    document.getElementById('sDeviceId').value = '';
    toast('Added: ' + name, true);
    loadSponsors();
  }).catch(e => toast(e.message, false));
}

function removeSponsor(id) {
  api('DELETE', '/gm/sponsors/' + encodeURIComponent(id)).then(() => {
    toast('Removed', true);
    loadSponsors();
  }).catch(e => toast(e.message, false));
}

// ---- Device Limits ----
function loadDeviceLimits() {
  api('GET', '/gm/device-limits').then(map => {
    const el = document.getElementById('deviceLimitList');
    const entries = Object.entries(map || {});
    if (entries.length === 0) {
      el.innerHTML = '<div class="empty">No overrides (using global)</div>';
      return;
    }
    el.innerHTML = entries.map(([did, max]) =>
      `<div class="item">
        <div class="item-info">
          <span class="item-meta" style="color:#ccc">${esc(did)}</span>
        </div>
        <span class="item-amount">${max === -1 ? '∞' : max}/day</span>
        <button class="btn-del" onclick="removeDeviceLimit('${esc(did)}')">x</button>
      </div>`
    ).join('');
  }).catch(e => {
    document.getElementById('deviceLimitList').innerHTML = '<div class="empty">Failed</div>';
  });
}

function addDeviceLimit() {
  const deviceId = document.getElementById('dlDeviceId').value.trim();
  const maxPerDay = parseInt(document.getElementById('dlMaxPerDay').value);
  if (!deviceId) return toast('DeviceId required', false);
  if (isNaN(maxPerDay) || (maxPerDay < 1 && maxPerDay !== -1)) return toast('Invalid max/day (-1 or ≥1)', false);
  api('POST', '/gm/device-limits', { deviceId, maxPerDay }).then(() => {
    document.getElementById('dlDeviceId').value = '';
    document.getElementById('dlMaxPerDay').value = '';
    toast('Device limit set', true);
    loadDeviceLimits();
  }).catch(e => toast(e.message, false));
}

function removeDeviceLimit(did) {
  api('DELETE', '/gm/device-limits/' + encodeURIComponent(did)).then(() => {
    toast('Removed', true);
    loadDeviceLimits();
  }).catch(e => toast(e.message, false));
}

// ---- Stats ----
function loadStats() {
  api('GET', '/gm/stats').then(s => {
    document.getElementById('ipMax').value = s.ipMaxPerDay || 20;
    document.getElementById('deviceMax').value = s.deviceMaxPerDay || 10;
    document.getElementById('statsArea').innerHTML = `
      <div class="stat-box"><div class="val">${s.totalToday || 0}</div><div class="lbl">Total Requests</div></div>
      <div class="stat-box"><div class="val">${s.blockedToday || 0}</div><div class="lbl">Blocked</div></div>
      <div class="stat-box"><div class="val">${s.uniqueIps || 0}</div><div class="lbl">Unique IPs</div></div>
      <div class="stat-box"><div class="val">${s.uniqueDevices || 0}</div><div class="lbl">Unique Devices</div></div>
    `;
  }).catch(e => {
    document.getElementById('statsArea').innerHTML = '<div class="loading">Failed</div>';
  });
}

// ---- Rate Limit ----
function saveRateLimit() {
  const ipMax = parseInt(document.getElementById('ipMax').value);
  const deviceMax = parseInt(document.getElementById('deviceMax').value);
  if (isNaN(ipMax) || isNaN(deviceMax) || ipMax < 1 || deviceMax < 1) {
    return toast('Invalid values', false);
  }
  api('POST', '/gm/rate-limit', { ipMaxPerDay: ipMax, deviceMaxPerDay: deviceMax }).then(() => {
    toast('Rate limit updated', true);
    loadStats();
  }).catch(e => toast(e.message, false));
}

// ---- Utils ----
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, ok) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.className = 'toast', 2000);
}
</script>
</body>
</html>
