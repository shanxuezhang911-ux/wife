<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑客数字雨 - 优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
            /* 模糊发光效果 */
            filter: blur(1px) brightness(1.2);
            -webkit-filter: blur(1px) brightness(1.2);
        }
    </style>
</head>
<body>
<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // 全屏
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = ['你的文字','自定义内容'];

    // 1. 初始化随机位置 → 解决第一次太整齐的问题
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
    }

    // 默认字符集
    let defaultChars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZコナニチハ';

    // 2. 自定义文字（你可以随时修改这里，或外部调用）
    let customTexts = [];

    // ==============================================
    // 外部可随时调用这个方法，传入自定义文字
    // 例：setCustomText(['SECURITY','SYSTEM','ERROR','CONNECTING'])
    // ==============================================
    function setCustomText(textArray) {
        customTexts = textArray;
    }

    // 获取字符（优先自定义文字）
    function getChar() {
        if (customTexts.length > 0 && Math.random() > 0.7) {
            return customTexts[Math.floor(Math.random() * customTexts.length)];
        }
        return defaultChars[Math.floor(Math.random() * defaultChars.length)];
    }

    function draw() {
        // 拖影效果
        ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 黑客绿
        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const text = getChar();
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            // 随机重置
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    // 动画帧率
    setInterval(draw, 35);

    // 自适应窗口
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
