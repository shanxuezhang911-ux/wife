<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>环形路径文字+阶梯错位拼接</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            width:100vw;height:100vh;
            background:#000;
            overflow:hidden;
            font-family:system-ui, sans-serif;
        }
        .container{
            position:relative;
            width:100%;height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        /* 环形轨道 */
        .circle-path{
            position:absolute;
            width:420px;
            height:420px;
            border-radius:50%;
            animation: rotateCircle 12s linear infinite;
        }

        /* 环形上的文字 */
        .circle-word{
            position:absolute;
            top:0;left:50%;
            width:20px;
            height:210px;
            transform-origin:bottom center;
            font-size:20px;
            color:#0ff;
            text-shadow:0 0 6px #0ff, 0 0 12px #0ff;
            transform:translateX(-50%) rotate(calc(var(--i)*22.5deg));
        }
        .circle-word span{
            display:inline-block;
        }

        @keyframes rotateCircle{
            0%{transform:rotate(0deg);}
            100%{transform:rotate(-360deg);}
        }

        /* 多段阶梯错位文字 */
        .text-group{
            position:absolute;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            z-index:10;
            text-align:center;
            color:#fff;
        }
        .text-item{
            font-size:28px;
            margin:10px 0;
            opacity:0;
            transform:translateY(40px);
            transition:all 0.7s cubic-bezier(0.25,0.8,0.25,1);
        }
        .text-item.show{
            opacity:1;
            transform:translateY(0);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 环形文字 -->
    <div class="circle-path">
        <div class="circle-word" style="--i:0"><span>系</span></div>
        <div class="circle-word" style="--i:1"><span>统</span></div>
        <div class="circle-word" style="--i:2"><span>加</span></div>
        <div class="circle-word" style="--i:3"><span>载</span></div>
        <div class="circle-word" style="--i:4"><span>中</span></div>
        <div class="circle-word" style="--i:5"><span>数</span></div>
        <div class="circle-word" style="--i:6"><span>据</span></div>
        <div class="circle-word" style="--i:7"><span>同</span></div>
        <div class="circle-word" style="--i:8"><span>步</span></div>
        <div class="circle-word" style="--i:9"><span>安</span></div>
        <div class="circle-word" style="--i:10"><span>全</span></div>
        <div class="circle-word" style="--i:11"><span>链</span></div>
        <div class="circle-word" style="--i:12"><span>接</span></div>
        <div class="circle-word" style="--i:13"><span>权</span></div>
        <div class="circle-word" style="--i:14"><span>限</span></div>
        <div class="circle-word" style="--i:15"><span>开</span></div>
        <div class="circle-word" style="--i:16"><span>启</span></div>
    </div>

    <!-- 多段阶梯错位文字 -->
    <div class="text-group">
        <div class="text-item">智能系统已启动</div>
        <div class="text-item">核心模块加载完成</div>
        <div class="text-item">数据流全速运行</div>
        <div class="text-item">安全加密已生效</div>
        <div class="text-item">任务执行完毕</div>
    </div>
</div>

<script>
    // 阶梯文字依次错位显示
    const items = document.querySelectorAll('.text-item');
    let idx = 0;
    function play(){
        items.forEach((it,i)=>it.classList.remove('show'));
        items[idx].classList.add('show');
        idx = (idx+1) % items.length;
        setTimeout(play, 1800);
    }
    setTimeout(play, 800);
</script>
</body>
</html>
